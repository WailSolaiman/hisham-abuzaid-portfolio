<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = "ha-theme";
          var s = localStorage.getItem(k);
          var dark =
            s === "dark" ||
            (s !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var ar = localStorage.getItem("ha-locale") === "ar";
          document.documentElement.lang = ar ? "ar" : "en";
          document.documentElement.dir = ar ? "rtl" : "ltr";
          document.documentElement.classList.toggle("locale-ar", ar);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="/favicon/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hisham Ali Ahmed Abuzaid — Transport & Strategic Infrastructure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Inter:wght@300;400;600&family=Manrope:wght@200;400;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
